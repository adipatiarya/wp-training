services:
  db:
    image: mysql:8.0.35
    container_name: wpdbtraining_db
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"
    volumes:
      - db_training_db:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin:latest
    depends_on:
      - db
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
      UPLOAD_LIMIT: 2048M
    ports:
      - "9001:80"
  wordpress:
    image: wordpress:latest
    ports:
      - "9000:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WP_DEBUG: true
    volumes:
      - ./wp-content/themes/fictional-univeristy-theme:/var/www/html/wp-content/themes/fictional-univeristy-theme
      - ./wp-content/plugins/secure-custom-fields:/var/www/html/wp-content/plugins/secure-custom-fields
      - ./wp-content/plugins/regenerate-thumbnails:/var/www/html/wp-content/plugins/regenerate-thumbnails
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./wp-content/uploads:/var/www/html/wp-content/uploads
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - db
volumes:
  db_training_db:
